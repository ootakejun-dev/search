        // ブラウザの記憶領域（localStorage）から過去の学習データを読み込む
        let clickLogs = JSON.parse(localStorage.getItem("classroom_click_logs_v2")) || {};

        const aliasDict = {
            "全教": "共", "ぜんきょう": "共", "基工": "基礎工", "pc": "call", "パソコン": "call"
        };

        // ==========================================
        // 1. 表記揺れ吸収パイプライン
        // ==========================================
        function normalizeText(text) {
            let halfStr = text.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
            });
            return halfStr.toLowerCase().replace(/\s+/g, '');
        }

        function applyAlias(text) {
            let res = text;
            for (let key in aliasDict) {
                if (res.includes(key)) res = res.replace(key, aliasDict[key]);
            }
            return res;
        }

        function extractBuildingAndRoom(text) {
            const alphaMatch = text.match(/[a-z]/);
            const building = alphaMatch ? alphaMatch[0].toUpperCase() : "";
            const numbers = (text.match(/\d+/g) || []).join("");
            return { building, numbers };
        }

        // ==========================================
        // 2. 検索＆スコアリング処理
        // ==========================================
        function searchRoom() {
            const rawQuery = document.getElementById("searchInput").value.trim();
            const resultArea = document.getElementById("resultArea");
            if (rawQuery === "") {
                resultArea.innerHTML = "";
                return;
            }

            // パイプライン実行
            const step1 = normalizeText(rawQuery);
            const step2 = applyAlias(step1);
            const { building, numbers } = extractBuildingAndRoom(step2);

            let results = [];

            rooms.forEach(room => {
                let score = 0;
                let isMatch = false;
                const roomNorm = normalizeText(room.primaryAbbr);
                const locNorm = normalizeText(room.location);

                // A. 文字列の部分一致チェック (基本スコア: 10点)
                /*if (roomNorm.includes(step2) || locNorm.includes(step2)) {
                    isMatch = true;
                    score += 10;
                }*/

                // B. ルール抽出マッチ (強力なスコア: 最大50点)
                if (building && roomNorm.toUpperCase().includes(building) && numbers && roomNorm.includes(numbers)) {
                    isMatch = true;
                    score += 50; 
                } 
                else if (numbers && roomNorm.includes(numbers) && step2.length > 1) {
                    isMatch = true;
                    score -= 50;
                }

                // C. 学習スコアの加算 (1クリックにつき +20点)
                if (isMatch) {
                    if (clickLogs[rawQuery] && clickLogs[rawQuery][room.id]) {
                        score += clickLogs[rawQuery][room.id] * 20;
                    }
                    results.push({ room, score });
                }
            });

            // スコアが高い順に並び替え
            results.sort((a, b) => b.score - a.score);

            // 結果の表示
            if (results.length > 0) {
                resultArea.innerHTML = results.map((res, index) => `
                    <div class="result-card">
                        <span class="score-badge">スコア: ${res.score}</span>
                        <span class="badge">${res.room.campus}</span>
                        <h3 style="margin-top: 5px; margin-bottom: 8px; color: #333;">【${res.room.primaryAbbr}】</h3>
                        <p style="margin: 5px 0;"><strong>配置:</strong> ${res.room.location}</p>
                        ${res.room.details ? `<p style="margin: 5px 0; font-size: 0.9em; color: #555;"><strong>用途:</strong> ${res.room.details}</p>` : ''}
                        
                        <button class="learn-btn" id="btn-${index}" onclick="learnClick('${rawQuery}', '${res.room.id}', 'btn-${index}')">
                            👆 よく使う教室として登録 (学習)
                        </button>
                    </div>
                `).join('');
            } else {
                resultArea.innerHTML = `<div class="error">該当なし: 検索条件に一致する教室が見つかりません。</div>`;
            }
        }

        // エンターキー検索
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); searchRoom(); }
        });

        // ==========================================
        // 3. ブラウザ学習機能 (localStorageへの保存)
        // ==========================================
        function learnClick(rawQuery, roomId, btnId) {
            if (!clickLogs[rawQuery]) clickLogs[rawQuery] = {};
            if (!clickLogs[rawQuery][roomId]) clickLogs[rawQuery][roomId] = 0;
            clickLogs[rawQuery][roomId] += 1;

            localStorage.setItem("classroom_click_logs_v2", JSON.stringify(clickLogs));

            const btn = document.getElementById(btnId);
            btn.innerHTML = "✅ 学習完了！次回から上位に表示されます";
            btn.classList.add("learned");
            btn.disabled = true;
        }
